<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 40px; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
    .login-title { font-size: 24px; font-weight: 800; text-align: center; color: #1a1a2e; margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid #e5e7eb;
      border-radius: 10px; font-size: 15px; margin-bottom: 12px; outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #667eea; }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 10px; font-size: 16px;
      font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-err { color: #ef4444; font-size: 13px; text-align: center; margin-top: 10px; display: none; }

    #dashboard { display: none; }
    .top-bar {
      background: #fff; padding: 16px 32px;
      border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .top-bar-logo { font-size: 28px; }
    .top-bar-title { font-size: 18px; font-weight: 800; color: #1a1a2e; }
    .top-bar-sub { font-size: 12px; color: #888; }
    .signout-btn {
      padding: 8px 18px; background: #f3f4f6; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      color: #555; cursor: pointer;
    }
    .signout-btn:hover { background: #e5e7eb; }

    .content { padding: 32px; max-width: 1200px; margin: 0 auto; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: #fff; border-radius: 16px; padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-card-value { font-size: 32px; font-weight: 900; color: #1a1a2e; line-height: 1; }
    .stat-card-label { font-size: 13px; color: #888; font-weight: 600; margin-top: 4px; }

    .section-header {
      display: flex; align-items: center; margin-bottom: 16px;
    }
    .section-title { font-size: 18px; font-weight: 800; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
    .refresh-btn {
      padding: 6px 14px; background: #f3f4f6; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      color: #555; cursor: pointer; margin-left: auto;
    }
    .refresh-btn:hover { background: #e5e7eb; }

    .table-wrap { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9fc; }
    th { padding: 12px 16px; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }
    td { padding: 14px 16px; font-size: 14px; color: #333; border-top: 1px solid #f0f2f5; vertical-align: middle; }
    tr:hover td { background: #fafbff; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .badge-blue { background: #eff6ff; color: #2563eb; }
    .badge-green { background: #f0fdf4; color: #16a34a; }
    .badge-orange { background: #fff7ed; color: #ea580c; }
    .badge-purple { background: #f5f3ff; color: #7c3aed; }

    .loading-view { text-align: center; padding: 60px; }
    .loading-spinner { font-size: 40px; margin-bottom: 12px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #888; font-size: 15px; }

    .empty { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .gen-at { font-size: 12px; color: #aaa; margin-top: 12px; text-align: right; }

    .avatar {
      width: 36px; height: 36px; border-radius: 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; font-weight: 800; font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-right: 10px;
    }
    .user-cell { display: flex; align-items: center; }
    .user-name { font-weight: 700; font-size: 14px; }
    .user-email { font-size: 12px; color: #888; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">HabitTracker — Admin access only</div>
    <input id="email-input" class="login-input" type="email" placeholder="Admin email" autocomplete="email" />
    <input id="pass-input" class="login-input" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
    <div style="text-align:center;margin-top:14px">
      <a href="#" onclick="doReset();return false;" style="font-size:13px;color:#667eea;font-weight:600;text-decoration:none">Forgot password?</a>
    </div>
    <div id="reset-msg" style="display:none;text-align:center;margin-top:10px;font-size:13px;color:#16a34a;font-weight:600"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">🏠</div>
      <div>
        <div class="top-bar-title">HabitTracker Admin</div>
        <div class="top-bar-sub" id="admin-email-label"></div>
      </div>
    </div>
    <button class="signout-btn" onclick="doSignOut()">Sign out</button>
  </div>

  <div class="content">
    <div id="loading-view" class="loading-view">
      <div class="loading-spinner">⚙️</div>
      <div class="loading-text">Loading data...</div>
    </div>
    <div id="main-view" style="display:none">
      <div class="stat-grid" id="stat-grid"></div>
      <div class="section-header">
        <div class="section-title">👥 Users</div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Joined</th>
              <th>Habits</th>
              <th>Tasks</th>
              <th>Done Tasks</th>
              <th>Check-ins</th>
              <th>Last Active</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
      <div class="gen-at" id="gen-at"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail }
    from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js';
  import { getFirestore, collection, getDocs }
    from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCEwLW0DzCF7oR4Wyi1N2svOzikNnXqIhA",
    authDomain: "habit-tracker-77ac0.firebaseapp.com",
    projectId: "habit-tracker-77ac0",
    storageBucket: "habit-tracker-77ac0.firebasestorage.app",
    messagingSenderId: "236338260275",
    appId: "1:236338260275:web:0460a1fd1e537160027646",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const ADMIN_EMAIL = 'jainamj7@gmail.com';

  window.doLogin = async () => {
    const email = document.getElementById('email-input').value.trim();
    const pass = document.getElementById('pass-input').value;
    const errEl = document.getElementById('login-err');
    errEl.style.display = 'none';
    if (email !== ADMIN_EMAIL) {
      errEl.textContent = 'Access denied — admin only.';
      errEl.style.display = 'block';
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
  };

  window.doSignOut = () => signOut(auth);

  window.doReset = async () => {
    const email = document.getElementById('email-input').value.trim() || ADMIN_EMAIL;
    const msgEl = document.getElementById('reset-msg');
    const errEl = document.getElementById('login-err');
    try {
      await sendPasswordResetEmail(auth, email);
      msgEl.textContent = `Reset email sent to ${email} — check your inbox.`;
      msgEl.style.display = 'block';
      errEl.style.display = 'none';
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
  };

  onAuthStateChanged(auth, user => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('admin-email-label').textContent = user.email;
      loadData();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }
  });

  window.loadData = async () => {
    document.getElementById('loading-view').style.display = 'block';
    document.getElementById('main-view').style.display = 'none';
    try {
      const snap = await getDocs(collection(db, 'users'));
      const users = snap.docs.map(d => {
        const data = d.data();
        const tasks = data.tasks ?? [];
        const habits = data.habits ?? [];
        const logs = data.logs ?? {};
        const completedTasks = tasks.filter(t => t.completed).length;
        const totalCheckins = Object.values(logs).reduce((s, arr) => s + arr.length, 0);
        const lastActive = Object.keys(logs).sort().pop() ?? null;
        return {
          name: data.profile?.name ?? 'Unknown',
          email: data.profile?.email ?? d.id,
          joinedAt: data.profile?.joinedAt ?? null,
          habitCount: habits.length,
          taskCount: tasks.length,
          completedTasks,
          totalCheckins,
          lastActive,
        };
      });
      renderDashboard(users);
    } catch (e) {
      document.getElementById('loading-view').innerHTML =
        `<div style="text-align:center;padding:60px;color:#ef4444">❌ Error: ${esc(e.message)}</div>`;
    }
  };

  function renderDashboard(users) {
    const totalHabits = users.reduce((s, u) => s + u.habitCount, 0);
    const totalTasks = users.reduce((s, u) => s + u.taskCount, 0);
    const totalCheckins = users.reduce((s, u) => s + u.totalCheckins, 0);
    const totalDone = users.reduce((s, u) => s + u.completedTasks, 0);

    document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card"><div class="stat-card-icon">👥</div><div class="stat-card-value">${users.length}</div><div class="stat-card-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-card-icon">💪</div><div class="stat-card-value">${totalHabits}</div><div class="stat-card-label">Habits Created</div></div>
      <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value">${totalDone}/${totalTasks}</div><div class="stat-card-label">Tasks Done / Total</div></div>
      <div class="stat-card"><div class="stat-card-icon">🔥</div><div class="stat-card-value">${totalCheckins}</div><div class="stat-card-label">Total Check-ins</div></div>
    `;

    const tbody = document.getElementById('users-tbody');
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No users yet</td></tr>';
    } else {
      tbody.innerHTML = users.map(u => {
        const initials = (u.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        return `
          <tr>
            <td>
              <div class="user-cell">
                <div class="avatar">${esc(initials)}</div>
                <div>
                  <div class="user-name">${esc(u.name)}</div>
                  <div class="user-email">${esc(u.email)}</div>
                </div>
              </div>
            </td>
            <td>${u.joinedAt ? fmtDate(u.joinedAt) : '—'}</td>
            <td><span class="badge badge-purple">💪 ${u.habitCount}</span></td>
            <td><span class="badge badge-blue">📋 ${u.taskCount}</span></td>
            <td><span class="badge badge-green">✅ ${u.completedTasks}</span></td>
            <td><span class="badge badge-orange">🔥 ${u.totalCheckins}</span></td>
            <td>${u.lastActive ? fmtDate(u.lastActive) : '—'}</td>
          </tr>
        `;
      }).join('');
    }

    document.getElementById('gen-at').textContent = 'Updated: ' + new Date().toLocaleString();
    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('main-view').style.display = 'block';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(s) {
    try { return new Date(s).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }); }
    catch { return String(s); }
  }

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });
</script>
</body>
</html>
